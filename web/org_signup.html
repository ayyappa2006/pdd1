<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Sign Up - CivicBin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-container">
            <img src="logo.png" alt="CivicBin Logo" class="logo-icon-small" style="width: 80px; height: 80px; border-radius: 16px; margin-bottom: 10px;">
        </div>
        
        <h1 class="login-title">Register Organization</h1>
        <p class="login-subtitle">Join us to manage your city</p>

        <form class="login-form" id="orgSignupForm">
            <div class="input-group">
                <label for="org_name">ORGANIZATION NAME</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">business</span>
                    <input type="text" id="org_name" placeholder="City of Springfield" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="city">CITY / LOCATION</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">location_city</span>
                    <input type="text" id="city" placeholder="Springfield" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="email">EMAIL ADDRESS</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">mail</span>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">PASSWORD</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">lock</span>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                Sign Up <span class="material-symbols-rounded">business_center</span>
            </button>
        </form>

        <p class="signup-prompt">
            Already have an account? <a href="org_login.html" class="signup-link">Login</a>
        </p>
    </div>


    <script>
        document.getElementById('orgSignupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const orgName = document.getElementById('org_name').value;
            const city = document.getElementById('city').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('http://localhost/civic_backend/org_signup.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ org_name: orgName, email: email, password: password, city: city })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('Organization registered successfully! Please log in.');
                    window.location.href = 'org_login.html';
                } else {
                    alert('Sign up failed: ' + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Network error connecting to backend.');
            });
        });
    </script>
</body>
</html>
