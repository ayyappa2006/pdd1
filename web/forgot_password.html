<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CivicBin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-container">
            <img src="logo.png" alt="CivicBin Logo" class="logo-icon-small" style="width: 80px; height: 80px; border-radius: 16px; margin-bottom: 10px;">
        </div>
        
        <h1 class="login-title">Reset Password</h1>
        <p class="login-subtitle">Enter your email and a new password</p>

        <form class="login-form" id="userForgotPasswordForm">
            <div class="input-group">
                <label for="email">EMAIL ADDRESS</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">mail</span>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="new_password">NEW PASSWORD</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">lock_reset</span>
                    <input type="password" id="new_password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                Save <span class="material-symbols-rounded">save</span>
            </button>
        </form>

        <p class="signup-prompt">
            <a href="login.html" class="signup-link">Back to Login</a>
        </p>
    </div>
    <script>
        document.getElementById('userForgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('new_password').value;

            fetch('http://localhost/civic_backend/user_reset_password.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email, new_password: newPassword })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    alert("Password updated successfully! Please log in.");
                    window.location.href = 'login.html';
                } else {
                    alert("Error: " + data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("Network error connecting to backend. Ensure XAMPP is running.");
            });
        });
    </script>
</body>
</html>
