# Appium Configuration for CivicBin Tests

# Server Configuration
APPIUM_SERVER_URL=http://127.0.0.1:4723

# Device Configuration
PLATFORM_NAME=Android
PLATFORM_VERSION=11
DEVICE_NAME=AndroidEmulator
APP_PACKAGE=com.civicbin
APP_ACTIVITY=.MainActivity

# App Settings
APP_PATH=./app/build/outputs/apk/debug/app-debug.apk
AUTO_GRANT_PERMISSIONS=true
AUTO_LAUNCH=true
NO_RESET=false
FULL_RESET=false

# Timeout Settings
IMPLICIT_WAIT=15
EXPLICIT_WAIT=20
PAGE_LOAD_TIMEOUT=30

# Test Data
BASE_URL=https://api.civicbin.com
TEST_USER_EMAIL=testuser@civicbin.com
TEST_USER_PASSWORD=TestUser@123
TEST_ORG_EMAIL=testorg@civicbin.com
TEST_ORG_PASSWORD=TestOrg@123

# Report Settings
REPORT_PATH=./appium_tests/reports
SCREENSHOT_ON_FAILURE=true
TAKE_SCREENSHOTS_FOR_EACH_STEP=false
